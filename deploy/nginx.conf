# ── OA Group — oalamoudi.com ──────────────────────────────────────────────
# Paths assume the project lives at /Users/School/Desktop/Omarwebsite/OAgroup
# When deploying to a Linux VPS, replace that prefix with /home/<user>/OAgroup
# and replace the self-signed ssl paths with Let's Encrypt paths.

# Redirect bare HTTP → HTTPS (non-www canonical)
server {
    listen 80;
    server_name oalamoudi.com www.oalamoudi.com;
    return 301 https://oalamoudi.com$request_uri;
}

# Redirect HTTPS www → non-www
server {
    listen 443 ssl;
    server_name www.oalamoudi.com;

    ssl_certificate     /Users/School/Desktop/Omarwebsite/OAgroup/ssl/oalamoudi.crt;
    ssl_certificate_key /Users/School/Desktop/Omarwebsite/OAgroup/ssl/oalamoudi.key;

    return 301 https://oalamoudi.com$request_uri;
}

# Main production server
server {
    listen 443 ssl;
    server_name oalamoudi.com;

    ssl_certificate     /Users/School/Desktop/Omarwebsite/OAgroup/ssl/oalamoudi.crt;
    ssl_certificate_key /Users/School/Desktop/Omarwebsite/OAgroup/ssl/oalamoudi.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Static files served directly by Nginx — never hits Django
    location /static/ {
        alias /Users/School/Desktop/Omarwebsite/OAgroup/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Everything else proxied to Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}
